<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>添加家人 · 粮达健康</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app" data-active="members" data-title="添加家人">
        <div class="onboard" style="background: transparent; padding: 0; min-height: auto;">
            <div class="onboard-card" style="max-width: 560px;">
                <div class="steps">
                    <div class="step-dot active"></div>
                    <div class="step-dot"></div>
                </div>
                <div class="onboard-icon">+</div>
                <div class="onboard-title">添加家人</div>
                <div class="onboard-sub">填写基本信息后，可以上传报告或绑定手环来完善档案</div>

                <div class="form-group">
                    <label class="form-label">姓名 *</label>
                    <input class="form-input" placeholder="如：张桂兰" value="张桂兰">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">关系 *</label>
                        <select class="form-select">
                            <option>妈妈</option>
                            <option>爸爸</option>
                            <option>丈夫</option>
                            <option>妻子</option>
                            <option>儿子</option>
                            <option>女儿</option>
                            <option>爷爷</option>
                            <option>奶奶</option>
                            <option>外公</option>
                            <option>外婆</option>
                            <option>其他</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">性别 *</label>
                        <select class="form-select">
                            <option>女</option>
                            <option>男</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">出生年 *</label>
                        <input class="form-input" type="number" placeholder="如：1961" value="1961">
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号（可选）</label>
                        <input class="form-input" placeholder="用于接收健康提醒">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">身高（cm）</label>
                        <input class="form-input" type="number" value="158">
                    </div>
                    <div class="form-group">
                        <label class="form-label">体重（kg）</label>
                        <input class="form-input" type="number" value="60">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">已知的慢病 / 健康标签</label>
                    <div style="display: flex; gap: 8px; flex-wrap: wrap; padding: 8px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-1);">
                        <span class="tag tag-info" style="cursor: pointer;">+ 高血压</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 糖尿病</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 高血脂</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 骨质疏松</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 痛风</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 心血管疾病</span>
                        <span class="tag tag-info" style="cursor: pointer;">+ 胃肠疾病</span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">过敏 / 忌口</label>
                    <input class="form-input" placeholder="如：海鲜过敏、忌辛辣" value="忌辛辣">
                </div>

                <div class="form-group">
                    <label class="form-label">口味偏好</label>
                    <input class="form-input" placeholder="如：偏清淡、喜欢面食">
                </div>

                <div class="alert alert-info" style="margin-top: 16px;">
                    <div class="alert-icon">ℹ</div>
                    <div>
                        添加后可以稍后 <strong>上传体检报告</strong> 或 <strong>绑定手环</strong> 来丰富档案。
                    </div>
                </div>

                <div style="display: flex; gap: 8px; margin-top: 24px; justify-content: space-between;">
                    <a href="members.html" class="btn">取消</a>
                    <div style="display: flex; gap: 8px;">
                        <a href="upload.html" class="btn">保存并上传报告</a>
                        <a href="members.html" class="btn btn-primary">保存</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/common.js"></script>
</body>
</html>
